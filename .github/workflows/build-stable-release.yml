name: Build Stable Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 30.0.272-for-math.1)'
        required: true
        default: '30.0.272-for-math.1'
        type: string
      branch:
        description: 'Branch to build from'
        required: true
        default: 'math-fork'
        type: string

permissions:
  contents: read

jobs:
  build-release:
    name: Build Stable Release
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch }}
        fetch-depth: 1

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Clone Flutter SDK
      run: |
        echo "Cloning Flutter SDK..."
        ./tools/ci/clone-flutter-sdk

    - name: Download Flutter SDK artifacts
      run: flutter precache --universal

    - name: Install dependencies
      run: flutter pub get

    - name: Enable Android platform
      run: flutter config --enable-android

    - name: Build Release APK
      run: flutter build apk --release

    - name: Rename APK with version
      run: |
        VERSION=${{ github.event.inputs.version }}
        APK_DIR=build/app/outputs/flutter-apk
        LATEST_APK=$(ls $APK_DIR/app-*.apk | head -n 1)
        NEW_NAME="zulip-android-${VERSION}.apk"
        cp "$LATEST_APK" "$APK_DIR/$NEW_NAME"
        echo "Created: $NEW_NAME"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: zulip-stable-release
        path: build/app/outputs/flutter-apk/zulip-android-*.apk
        if-no-files-found: error
        retention-days: 90

    - name: Generate release summary
      run: |
        echo "## 📦 Stable Release Build" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Build Info" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: ${{ github.event.inputs.branch }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
        echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📥 Download" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Download the APK from the **Artifacts** section below." >> $GITHUB_STEP_SUMMARY

    - name: Create release tag
      if: startsWith(github.event.inputs.version, 'v')
      run: |
        echo "Release version: ${{ github.event.inputs.version }}"
        echo "This build is ready for release"
